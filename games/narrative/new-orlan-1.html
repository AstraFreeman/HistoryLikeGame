<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Історична вікторина</title>
    <link rel="stylesheet" href="../../shared/css/reset.css">
    <link rel="stylesheet" href="../../shared/css/theme.css">
    <link rel="stylesheet" href="../../shared/css/animations.css">
    <style>
        /* Основний стиль сторінки */
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to bottom, #74b9ff, #0984e3);
            color: white;
            text-align: center;
            min-height: 100vh;
            overflow-y: auto;
        }
        
        #pauseMenu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        #pauseMenu button {
            margin-top: 15px;
            padding: 12px 25px;
        }

        h1 {
            margin: 10px 0 20px;
            font-size: clamp(1.5em, 5vw, 2.5em);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #gameContainer {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 20px;
        }

        #gameArea {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 50vh;
            min-height: 400px;
            border: 3px solid #ffffff;
            border-radius: 15px;
            background: linear-gradient(to bottom, #dfe6e9, #b2bec3);
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            flex: 1 1 300px;
        }

        #answersPanel {
            width: 100%;
            max-width: 350px;
            height: 50vh;
            min-height: 400px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #ffffff;
            border-radius: 15px;
            padding: 15px;
            overflow-y: auto;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            flex: 1 1 250px;
        }

        #answersPanel h3 {
            margin-top: 0;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            font-size: clamp(1em, 3vw, 1.3em);
        }

        .answer-item {
            background: rgba(255, 118, 117, 0.9);
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: left;
            font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            word-wrap: break-word;
        }

        .answer-item strong {
            display: block;
            margin-bottom: 5px;
            color: #fff;
        }

        .answer-item span {
            color: #ffeb3b;
            font-weight: bold;
        }

        .question {
            position: absolute;
            font-size: clamp(0.8em, 2vw, 1em);
            background: #ff7675;
            padding: 10px 15px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in;
            max-width: 90%;
        }

        #input {
            width: 90%;
            max-width: 500px;
            padding: 12px;
            font-size: 1em;
            border: 2px solid #ffffff;
            border-radius: 8px;
            margin: 15px auto;
            display: block;
        }

        #stats {
            margin: 15px 0;
            font-size: clamp(0.9em, 2.5vw, 1em);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        #stats p {
            margin: 8px 0;
        }

        #controls {
            margin: 20px 0;
        }

        button {
            padding: 12px 20px;
            font-size: clamp(0.9em, 2.5vw, 1em);
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #74b9ff;
            color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease-in-out;
            margin: 5px;
        }

        button:hover {
            background: #0984e3;
            transform: scale(1.05);
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #winMessage, #loseMessage {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(1.2em, 4vw, 1.8em);
            background: #55efc4;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            max-width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        #loseMessage {
            background: #ff7675;
        }

        #winMessage img {
            max-width: 100%;
            width: 300px;
            height: auto;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* Overlay для повідомлень */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1500;
        }

        @media (max-width: 768px) {
            #gameContainer {
                flex-direction: column;
            }

            #gameArea, #answersPanel {
                max-width: 100%;
            }
        }

        /* ── Accessibility: light theme ── */
        body.theme-light {
            background: linear-gradient(to bottom, #e8e8e3, #ddd8d0);
            color: #1a1a2e;
        }
        body.theme-light #gameArea {
            border-color: #999;
            background: linear-gradient(to bottom, #f5f5f0, #e8e8e3);
        }
        body.theme-light #answersPanel {
            background: rgba(0, 0, 0, 0.05);
            border-color: #999;
            color: #1a1a2e;
        }
        body.theme-light #answersPanel h3 {
            color: #1a1a2e;
            text-shadow: none;
        }
        body.theme-light #input {
            border-color: #999;
            background: #fff;
            color: #1a1a2e;
        }
        body.theme-light #stats {
            text-shadow: none;
            color: #1a1a2e;
        }
        body.theme-light button {
            background: #4a90d9;
            color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        body.theme-light button:hover { background: #3a7bc8; }
        body.theme-light .question {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
        body.theme-light #winMessage {
            background: #d4edda;
            color: #1a1a2e;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            text-shadow: none;
        }
        body.theme-light #loseMessage {
            background: #f8d7da;
            color: #1a1a2e;
            text-shadow: none;
        }
        body.theme-light h1 {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            color: #1a1a2e;
        }
        body.theme-light #pauseMenu {
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a2e;
        }
        body.theme-light .answer-item {
            background: rgba(220, 53, 69, 0.15);
            color: #1a1a2e;
        }
        body.theme-light .answer-item span { color: #cc3333; }

        /* ── Accessibility: high contrast ── */
        .high-contrast #gameArea,
        .high-contrast #answersPanel {
            border-width: 4px;
        }
        .high-contrast .question {
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        .high-contrast #input {
            border-width: 3px;
        }
        .high-contrast button {
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body data-section="Русь-Україна" data-game-title="Вікторина" data-home-url="../../index.html">
    <h1>Історична Вікторина</h1>
    <div id="gameContainer">
        <div id="gameArea"></div>
        <div id="answersPanel">
            <h3>Пропущені питання</h3>
            <div id="answersList"></div>
        </div>
    </div>
    <input type="text" id="input" placeholder="Введіть відповідь..." disabled>
    <div id="stats">
        <p>Рахунок: <span id="score">0</span></p>
        <p>Життя: <span id="lives">3</span></p>
    </div>

    <div id="pauseMenu">
        <h2>Гра на паузі</h2>
        <button id="resumeButton">Продовжити</button>
    </div>

    <div id="controls">
        <button id="startButton">Розпочати Гру</button>
        <button id="restartButton" disabled>Перезапустити</button>
        <button id="exitButton">Вийти</button>
    </div>
    
    <div class="overlay" id="winOverlay"></div>
    <div id="winMessage">
        Вітаємо! Ви виграли!
        <br>
        <img src="../../assets/images/Cossack.jpg" alt="Козак" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <p style="display:none; color: #fff; margin-top: 10px;">🏆 Переможець! 🏆</p>
        <br>
        <a href="../../index.html" style="display:inline-block;margin-top:15px;padding:12px 30px;font-size:var(--text-lg);background:#74b9ff;color:white;border-radius:8px;text-decoration:none;font-weight:bold;box-shadow:0 2px 5px rgba(0,0,0,0.3);">На головну</a>
    </div>
    
    <div class="overlay" id="loseOverlay"></div>
    <div id="loseMessage">Гру завершено! У вас закінчилися життя.</div>

    <script>
        const questions = [
            { question: "Укладення ченцем Нестором першої редакції «Повісті минулих літ»", answer: "1113" },
            { question: "Утворення Галицько-Волинського князівства", answer: "1199" },
            { question: "Рік хрещення Русі", answer: "988" },
            { question: "Коли була заснована Київська Русь?", answer: "882" },
            { question: "Битва біля річки Альта", answer: "1068" },
            { question: "Перша літописна згадка назви «Україна»", answer: "1187" },
            { question: "Походи Олега на Константинополь у 907 р. та *пропуск*", answer: "911" },
            { question: "Повстання древлян проти Ігоря", answer: "945" }
        ];

        const gameArea = document.getElementById("gameArea");
        const inputElement = document.getElementById("input");
        const scoreElement = document.getElementById("score");
        const livesElement = document.getElementById("lives");
        const startButton = document.getElementById("startButton");
        const restartButton = document.getElementById("restartButton");
        const exitButton = document.getElementById("exitButton");
        const pauseMenu = document.getElementById("pauseMenu");
        const winMessage = document.getElementById("winMessage");
        const loseMessage = document.getElementById("loseMessage");
        const winOverlay = document.getElementById("winOverlay");
        const loseOverlay = document.getElementById("loseOverlay");
        const answersList = document.getElementById("answersList");

        let activeQuestions = [];
        let score = 0;
        let lives = 3;
        let gameInterval;
        let dropInterval;

        function startGame() {
            resetGame();
            inputElement.disabled = false;
            inputElement.focus();
            startButton.disabled = true;
            restartButton.disabled = false;

            addQuestion();
            gameInterval = setInterval(addQuestion, 5000);
            dropInterval = setInterval(moveQuestions, 50);
        }

        function resetGame() {
            activeQuestions.forEach(q => q.element.remove());
            activeQuestions = [];
            score = 0;
            lives = 3;
            scoreElement.textContent = score;
            livesElement.textContent = lives;
            answersList.innerHTML = "";
            clearInterval(gameInterval);
            clearInterval(dropInterval);
            inputElement.value = "";
            winMessage.style.display = "none";
            loseMessage.style.display = "none";
            winOverlay.style.display = "none";
            loseOverlay.style.display = "none";
        }

        function addQuestion() {
            if (activeQuestions.length >= 5) return;

            const randomIndex = Math.floor(Math.random() * questions.length);
            const questionData = questions[randomIndex];
            const questionElement = document.createElement("div");
            questionElement.classList.add("question");
            questionElement.textContent = questionData.question;

            const startX = Math.random() * (gameArea.offsetWidth - 150);
            questionElement.style.left = `${startX}px`;
            questionElement.style.top = `0px`;

            gameArea.appendChild(questionElement);

            activeQuestions.push({
                question: questionData.question,
                answer: questionData.answer,
                element: questionElement,
                top: 0
            });
        }

        function moveQuestions() {
            activeQuestions.forEach((q, index) => {
                q.top += 1;
                q.element.style.top = `${q.top}px`;

                if (q.top > gameArea.offsetHeight) {
                    q.element.remove();
                    activeQuestions.splice(index, 1);
                    addMissedAnswer(q.question, q.answer);
                    loseLife();
                }
            });
        }

        function addMissedAnswer(question, answer) {
            const answerItem = document.createElement("div");
            answerItem.classList.add("answer-item");
            answerItem.innerHTML = `<strong>${question}</strong><span>Відповідь: ${answer}</span>`;
            answersList.appendChild(answerItem);
            answersList.scrollTop = answersList.scrollHeight;
        }

        function loseLife() {
            lives--;
            livesElement.textContent = lives;
            if (lives <= 0) {
                endGame(false);
            }
        }

        inputElement.addEventListener("input", () => {
            const input = inputElement.value.trim();
            const matchedQuestionIndex = activeQuestions.findIndex(q => q.answer.toLowerCase() === input.toLowerCase());

            if (matchedQuestionIndex !== -1) {
                const matchedQuestion = activeQuestions[matchedQuestionIndex];
                matchedQuestion.element.remove();
                activeQuestions.splice(matchedQuestionIndex, 1);

                score++;
                scoreElement.textContent = score;
                inputElement.value = "";

                if (score >= 15) {
                    endGame(true);
                }
            }
        });

        function pauseGame() {
            isPaused = true;
            pauseMenu.style.display = "block";
            clearInterval(gameInterval);
            clearInterval(dropInterval);
        }

        function resumeGame() {
            isPaused = false;
            pauseMenu.style.display = "none";
            gameInterval = setInterval(addQuestion, 5000);
            dropInterval = setInterval(moveQuestions, 50);
        }

        function endGame(isWin) {
            clearInterval(gameInterval);
            clearInterval(dropInterval);
            activeQuestions.forEach(q => q.element.remove());
            activeQuestions = [];
            inputElement.disabled = true;

            if (isWin) {
                winOverlay.style.display = "block";
                winMessage.style.display = "block";
            } else {
                loseOverlay.style.display = "block";
                loseMessage.style.display = "block";
            }

            restartButton.disabled = true;
            startButton.disabled = false;
        }

        startButton.addEventListener("click", startGame);
        restartButton.addEventListener("click", () => {
            resetGame();
            startGame();
        });
        exitButton.addEventListener("click", () => {
            resetGame();
            alert("Ви вийшли з гри. До зустрічі!");
        });
        
        // Закриття повідомлень по кліку на overlay
        winOverlay.addEventListener("click", () => {
            winMessage.style.display = "none";
            winOverlay.style.display = "none";
        });
        
        loseOverlay.addEventListener("click", () => {
            loseMessage.style.display = "none";
            loseOverlay.style.display = "none";
        });
    </script>
    <script src="../../shared/js/nav.js"></script>
    <script src="../../shared/js/accessibility.js"></script>
</body>
</html>
