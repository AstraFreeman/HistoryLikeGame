<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>УПС, не туди</title>
    <link rel="stylesheet" href="../../shared/css/reset.css">
    <link rel="stylesheet" href="../../shared/css/theme.css">
    <link rel="stylesheet" href="../../shared/css/animations.css">
    <style>
        /* Базові стилі */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .door {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 3;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .door:hover {
            transform: scale(1.02);
        }

        .btn {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background-color: green;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            z-index: 4;
            font-size: var(--text-base);
        }

        .hidden {
            display: none;
        }

        .buttons {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2; /* Зображення Door_S перекриває кнопки */
        }

        .buttons a, .buttons button {
            text-decoration: none;
            background-color: #00bfff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            text-align: center;
            font-size: var(--text-sm);
        }

        /* Медіа-запити для мобільних пристроїв */
        @media (max-width: 768px) {
            .btn {
                font-size: var(--text-sm);
                padding: 8px 16px;
            }

            .buttons a, .buttons button {
                font-size: var(--text-xs);
                padding: 8px 16px;
            }

            .door:hover {
                transform: none; /* Вимкнення ефекту наведення на мобільних */
            }
        }

        @media (max-width: 480px) {
            .btn {
                font-size: var(--text-xs);
                padding: 6px 12px;
            }

            .buttons {
                gap: 8px;
            }

            .buttons a, .buttons button {
                font-size: var(--text-xs);
                padding: 6px 12px;
            }
        }

        /* ── Accessibility: light theme ── */
        body.theme-light {
            background-color: #f0f0eb;
        }
        body.theme-light .btn {
            background-color: #22885a;
        }
        body.theme-light .buttons a,
        body.theme-light .buttons button {
            background-color: #4a90d9;
        }

        /* ── Accessibility: high contrast ── */
        .high-contrast .btn,
        .high-contrast .buttons a,
        .high-contrast .buttons button {
            border: 2px solid rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body data-nav="overlay" data-home-url="../../index.html">
    <div class="container">
        <img src="../../assets/images/Paint_1.jpg" class="background">
        <img src="../../assets/images/Paint_0.png" class="background hidden" id="paintTop">
        <img src="../../assets/images/Door_S.jpg" class="door" id="door">
        <button class="btn" id="peekButton">Заглянути</button>
        <div class="buttons hidden" id="actionButtons">
            <a href="../../index.html">На головну</a>
            <button id="playMusic">Пісня</button>
        </div>
        <audio id="audioPlayer" src="../../assets/music/sugar_slowed.mp3" preload="auto"></audio>
    </div>

    <script>
        const door = document.getElementById('door');
        const peekButton = document.getElementById('peekButton');
        const paintTop = document.getElementById('paintTop');
        const actionButtons = document.getElementById('actionButtons');
        const audioPlayer = document.getElementById('audioPlayer');
        const playMusicButton = document.getElementById('playMusic');

        // Ефект слідкування за мишею
        document.addEventListener('mousemove', (e) => {
            const rect = door.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            door.style.transform = `translate(${x * 0.02}px, ${y * 0.02}px)`;
        });

        // Логіка кнопки "Заглянути"
        peekButton.addEventListener('click', () => {
            if (window.HLGAnalytics) HLGAnalytics.startSession('compas');
            door.classList.add('hidden');
            peekButton.classList.add('hidden');
            paintTop.classList.remove('hidden');
            actionButtons.classList.remove('hidden'); // Показати кнопки після зникнення дверей
        });

        // Програвання музики
        playMusicButton.addEventListener('click', () => {
            audioPlayer.play();
        });
    </script>
    <script src="../../shared/js/nav.js"></script>
    <script src="../../shared/js/analytics.js"></script>
    <script src="../../shared/js/accessibility.js"></script>
</body>
</html>
