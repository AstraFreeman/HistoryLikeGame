<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта де Боплана</title>
  <link rel="stylesheet" href="../../shared/css/reset.css">
  <link rel="stylesheet" href="../../shared/css/theme.css">
  <link rel="stylesheet" href="../../shared/css/layout.css">
  <link rel="stylesheet" href="../../shared/css/components.css">
  <link rel="stylesheet" href="../../shared/css/animations.css">
  <link rel="stylesheet" href="../../shared/css/responsive.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .map-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .map-content {
      position: relative;
      transform-origin: top left;
      transition: transform 0.3s ease;
    }

    .map-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Pin markers */
    .map-button {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 10;
      text-decoration: none;
      transition: transform 0.2s;
    }
    .map-button:hover {
      transform: scale(1.15);
    }
    .map-pin {
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      background: var(--gradient-primary);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    .map-label {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      font-size: var(--text-sm);
      color: var(--color-text-primary);
      white-space: nowrap;
      box-shadow: var(--glass-shadow);
    }

    /* Floating controls */
    .floating-button {
      position: fixed;
      z-index: 1000;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-lg);
      cursor: pointer;
      transition: background-color 0.3s, transform 0.3s;
    }
    .floating-button:hover {
      background-color: rgba(0, 0, 0, 0.9);
      transform: scale(1.1);
    }

    .zoom-in { bottom: 90px; left: 20px; }
    .zoom-out { bottom: 20px; left: 20px; }
    .move-up { bottom: 150px; right: 80px; }
    .move-down { bottom: 20px; right: 80px; }
    .move-left { bottom: 85px; right: 140px; }
    .move-right { bottom: 85px; right: 20px; }
    .fullscreen { top: 20px; right: 20px; }

    /* Info panel */
    .info-toggle {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1100;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      color: var(--color-text-primary);
      font-size: var(--text-2xl);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glass-shadow);
      transition: transform 0.2s;
    }
    .info-toggle:hover {
      transform: scale(1.1);
    }
    .info-panel {
      position: fixed;
      top: 74px;
      left: 20px;
      z-index: 1100;
      max-width: 360px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      box-shadow: var(--glass-shadow);
      color: var(--color-text-secondary);
      line-height: 1.6;
      font-size: var(--text-sm);
    }
    .info-panel h3 {
      margin: 0 0 var(--space-sm);
      font-size: var(--text-lg);
      color: var(--color-text-primary);
      font-weight: 700;
    }
    .info-panel p {
      margin: 0;
    }
    .info-hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .floating-button {
        width: 40px;
        height: 40px;
        font-size: var(--text-base);
      }
      .info-panel {
        max-width: calc(100vw - 80px);
      }
    }

    @media (max-width: 480px) {
      .floating-button {
        width: 35px;
        height: 35px;
        font-size: var(--text-sm);
      }
      .map-label {
        font-size: var(--text-xs);
        padding: 3px 7px;
      }
      .info-toggle {
        width: 36px;
        height: 36px;
        font-size: var(--text-lg);
      }
    }

    /* ── Accessibility: light theme ── */
    body.theme-light .floating-button {
      background-color: rgba(255, 255, 255, 0.9);
      color: #1a1a2e;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }
    body.theme-light .floating-button:hover {
      background-color: rgba(255, 255, 255, 1);
    }

    /* ── Accessibility: high contrast ── */
    .high-contrast .floating-button {
      border: 2px solid rgba(255, 255, 255, 0.6);
    }
    .high-contrast .info-toggle {
      border-width: 2px;
    }
    .high-contrast .info-panel {
      border-width: 2px;
    }
  </style>
</head>
<body data-section="Козацька доба" data-game-title="Карта де Боплана" data-nav="overlay" data-home-url="../../index.html">

  <div class="map-container" id="mapContainer">
    <div class="map-content" id="mapContent">
      <img src="../../assets/map/2-4.jpg" alt="Карта Гійома де Боплана — карта українських земель XVII століття" class="map-image">

      <a href="../narrative/taxes-1.html" class="map-button" style="top:25%;left:25%;">
        <span class="map-pin"></span>
        <span class="map-label">Литовська спадщина</span>
      </a>

      <a href="../../shared/templates/timeline-sort.html?id=period-4-kozaky" class="map-button" style="top:50%;left:60%;">
        <span class="map-pin"></span>
        <span class="map-label">Козацька хронологія</span>
      </a>

      <a href="../start-pages/new-makako-start-2.html" class="map-button" style="top:70%;left:30%;">
        <span class="map-pin"></span>
        <span class="map-label">Міжнародні договори</span>
      </a>
    </div>
  </div>

  <!-- Floating controls -->
  <button class="floating-button zoom-in" onclick="zoomIn()">+</button>
  <button class="floating-button zoom-out" onclick="zoomOut()">-</button>
  <button class="floating-button move-up" onclick="moveDown()">&#8593;</button>
  <button class="floating-button move-down" onclick="moveUp()">&#8595;</button>
  <button class="floating-button move-left" onclick="moveRight()">&#8592;</button>
  <button class="floating-button move-right" onclick="moveLeft()">&#8594;</button>
  <button class="floating-button fullscreen" onclick="toggleFullscreen()">&#10530;</button>

  <script>
    // ── Info panel (DOM-created, no innerHTML) ──────────────────────
    (function () {
      var toggle = document.createElement('button');
      toggle.className = 'info-toggle';
      toggle.setAttribute('aria-label', 'Інформація про карту');
      toggle.textContent = '\u24D8';
      document.body.appendChild(toggle);

      var panel = document.createElement('div');
      panel.className = 'info-panel info-hidden';
      var heading = document.createElement('h3');
      heading.textContent = 'Карта Гійома де Боплана';
      panel.appendChild(heading);
      var text = document.createElement('p');
      text.textContent = 'Гійом Левассер де Боплан (1595\u20131685) \u2014 французький інженер та картограф на службі Речі Посполитої у 1630\u20131648 рр. Його карта \u00ABDelineatio Generalis\u00BB \u2014 одна з найдетальніших ранніх карт українських земель, що зафіксувала географію козацької України напередодні повстання Хмельницького.';
      panel.appendChild(text);
      document.body.appendChild(panel);

      toggle.addEventListener('click', function () {
        panel.classList.toggle('info-hidden');
      });
    })();

    // ── Prevent drag handler from swallowing marker clicks ─────────
    document.querySelectorAll('.map-button').forEach(function (btn) {
      btn.addEventListener('mousedown', function (e) {
        e.stopPropagation();
      });
      btn.addEventListener('touchstart', function (e) {
        e.stopPropagation();
      });
    });

    // ── Map zoom / pan ─────────────────────────────────────────────
    var scale = 1;
    var offsetX = 0, offsetY = 0;
    var isDragging = false;
    var startX, startY;
    var initialScale = 1;
    var initialDistance = 0;

    var mapContent = document.getElementById('mapContent');
    var mapContainer = document.getElementById('mapContainer');

    function zoomIn() {
      scale += 0.1;
      updateTransform();
    }

    function zoomOut() {
      if (scale > 0.1) {
        scale -= 0.1;
        updateTransform();
      }
    }

    function updateTransform() {
      mapContent.style.transform = 'scale(' + scale + ') translate(' + offsetX + 'px, ' + offsetY + 'px)';
    }

    function moveUp() { offsetY -= 20; updateTransform(); }
    function moveDown() { offsetY += 20; updateTransform(); }
    function moveLeft() { offsetX -= 20; updateTransform(); }
    function moveRight() { offsetX += 20; updateTransform(); }

    mapContainer.addEventListener('mousedown', function (event) {
      isDragging = true;
      startX = event.clientX - offsetX;
      startY = event.clientY - offsetY;
      mapContainer.style.cursor = 'grabbing';
    });

    mapContainer.addEventListener('mousemove', function (event) {
      if (isDragging) {
        offsetX = event.clientX - startX;
        offsetY = event.clientY - startY;
        updateTransform();
      }
    });

    mapContainer.addEventListener('mouseup', function () {
      isDragging = false;
      mapContainer.style.cursor = 'default';
    });

    mapContainer.addEventListener('touchstart', function (event) {
      if (event.touches.length === 1) {
        isDragging = true;
        startX = event.touches[0].clientX - offsetX;
        startY = event.touches[0].clientY - offsetY;
      } else if (event.touches.length === 2) {
        isDragging = false;
        initialScale = scale;
        initialDistance = getDistance(event.touches[0], event.touches[1]);
      }
    });

    mapContainer.addEventListener('touchmove', function (event) {
      if (isDragging && event.touches.length === 1) {
        offsetX = event.touches[0].clientX - startX;
        offsetY = event.touches[0].clientY - startY;
        updateTransform();
      } else if (event.touches.length === 2) {
        var newDistance = getDistance(event.touches[0], event.touches[1]);
        var scaleChange = newDistance / initialDistance;
        scale = initialScale * scaleChange;
        updateTransform();
      }
    });

    mapContainer.addEventListener('touchend', function () {
      isDragging = false;
    });

    function getDistance(touch1, touch2) {
      var deltaX = touch2.clientX - touch1.clientX;
      var deltaY = touch2.clientY - touch1.clientY;
      return Math.sqrt(deltaX * deltaX + deltaY * deltaY);
    }

    mapContainer.addEventListener('wheel', function (event) {
      event.preventDefault();
      if (event.deltaY < 0) {
        zoomIn();
      } else {
        zoomOut();
      }
    });

    mapContainer.addEventListener('mouseenter', function () {
      document.body.style.overflow = 'hidden';
    });

    mapContainer.addEventListener('mouseleave', function () {
      document.body.style.overflow = '';
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        mapContainer.requestFullscreen().catch(function (err) {
          alert('Не вдалося увійти у повноекранний режим: ' + err.message);
        });
      } else {
        document.exitFullscreen();
      }
    }
  </script>
  <script src="../../shared/js/nav.js"></script>
  <script src="../../shared/js/analytics.js"></script>
  <script src="../../shared/js/accessibility.js"></script>
</body>
</html>
