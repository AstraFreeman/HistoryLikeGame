<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>AR Мистецтво — Зображення 2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
    <a href="../../index.html" style="position:fixed;top:15px;left:15px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:10px 16px;border-radius:8px;font-family:sans-serif;font-size:14px;backdrop-filter:blur(8px);transition:background 0.2s;">На головну</a>
    <a href="ontario-akac-1.html" style="position:fixed;top:15px;right:15px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:10px 16px;border-radius:8px;font-family:sans-serif;font-size:14px;backdrop-filter:blur(8px);transition:background 0.2s;">Назад</a>

    <a-scene embedded arjs>
        <a-assets>
            <img id="img2" src="img_2.png">
        </a-assets>

        <a-marker preset="hiro">
            <a-plane
                position="0 0 0.2"
                rotation="-90 0 0"
                width="1.5"
                height="2"
                scale="0.7 0.7 0.7"
                color="white"
                src="#img2">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
