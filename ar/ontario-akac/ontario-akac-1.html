<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>AR Мистецтво Стародавнього Сходу — Акація</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
    <a href="../../index.html" style="position:fixed;top:15px;left:15px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:10px 16px;border-radius:8px;font-family:sans-serif;font-size:14px;backdrop-filter:blur(8px);transition:background 0.2s;">На головну</a>
    <a href="ontario-akac-test-2.html" style="position:fixed;top:15px;right:15px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:10px 16px;border-radius:8px;font-family:sans-serif;font-size:14px;backdrop-filter:blur(8px);transition:background 0.2s;">Далі</a>

    <a-scene embedded arjs>
        <a-assets>
            <img id="img1" src="img_1.png">
            <img id="img2" src="img_2.png">
            <img id="img3" src="img_3.png">
        </a-assets>

        <a-marker preset="hiro">
            <!-- Зображення 1 (ліворуч) -->
            <a-plane
                position="-0.6 0 0"
                rotation="0 90 0"
                width="1.5"
                height="2"
                scale="0.5 0.5 0.5"
                color="white"
                src="#img1">
            </a-plane>

            <!-- Зображення 2 (праворуч) -->
            <a-plane
                position="0.6 0 0"
                rotation="0 -90 0"
                width="1.5"
                height="2"
                scale="0.5 0.5 0.5"
                color="white"
                src="#img2">
            </a-plane>

            <!-- Зображення 3 (по центру) -->
            <a-plane
                position="0 0 0.6"
                rotation="0 0 0"
                width="1.5"
                height="2"
                scale="0.5 0.5 0.5"
                color="white"
                src="#img3">
            </a-plane>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
