<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>Онтаріо — Сімейні стосунки в Україні XVIII ст.</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.1.0/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:15px;left:15px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:10px 16px;border-radius:8px;font-family:sans-serif;font-size:14px;backdrop-filter:blur(8px);transition:background 0.2s;">На головну</a>
    <a-scene>
        <a-assets>
            <img id="akac-img1" src="ontario-akac/img_1.png">
            <img id="akac-img2" src="ontario-akac/img_2.png">
            <img id="akac-img3" src="ontario-akac/img_3.png">
            <img id="bere-img1" src="ontario-bere/img_1.jpg">
            <img id="bere-img2" src="ontario-bere/img_2.jpg">
        </a-assets>

        <!-- Камера в центрі -->
        <a-entity camera look-controls wasd-controls="acceleration: 25" position="0 1.3 0">
            <a-entity id="mouseCursor" cursor="rayOrigin: mouse"></a-entity>
        </a-entity>

        <!-- Площина-основа -->
        <a-circle
            position="0 0 0"
            rotation="-90 0 0"
            radius="6"
            color="#D4A574">
        </a-circle>

        <!-- Заголовок (над головою) -->
        <a-text
            value="Simejni stosunky v Ukraini XVIII st."
            align="center"
            position="0 3.5 -3.5"
            font="../assets/fonts/ADVENTURE.TTF-msdf.json"
            color="#5C3A1F"
            negate="false"
            scale="0.7 0.7 0.7">
        </a-text>

        <!-- ===== 1. Акація — зображення 1 (θ=0°, перед користувачем) ===== -->
        <a-plane
            id="akac1-image"
            position="0 1 -3.5"
            rotation="0 0 0"
            width="1.5"
            height="2"
            color="white"
            src="#akac-img1"
            data-image="true"
            animation__cursor-enter="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
            animation__cursor-leave="property: scale; from: 1.1 1.1 1.1; to: 1 1 1; dur: 200; startEvents: mouseleave"
            animation__click-up="property: position; from: 0 1 -3.5; to: 0 2.5 -3.5; dur: 500; easing: easeOutQuad; startEvents: click-up"
            animation__click-down="property: position; from: 0 2.5 -3.5; to: 0 1 -3.5; dur: 500; easing: easeOutQuad; startEvents: click-down">
        </a-plane>
        <a-text value="Akatsiya 1" align="center" position="0 -0.3 -3.5" rotation="0 0 0" color="#5C3A1F" scale="0.6 0.6 0.6"></a-text>
        <a-entity id="akac1-hidden-button" position="0 3.2 -3.5" rotation="0 0 0" visible="false">
            <a-box color="#8B5E3C" depth="0.2" height="0.5" width="1.2" id="akac1-go-button"></a-box>
            <a-text value="Vidkryty" align="center" position="0 0 0.15" color="#FFFFFF" scale="0.8 0.8 0.8"></a-text>
        </a-entity>

        <!-- ===== 2. Акація — зображення 2 (θ=72°, праворуч-спереду) ===== -->
        <a-plane
            id="akac2-image"
            position="3.33 1 -1.08"
            rotation="0 -72 0"
            width="1.5"
            height="2"
            color="white"
            src="#akac-img2"
            data-image="true"
            animation__cursor-enter="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
            animation__cursor-leave="property: scale; from: 1.1 1.1 1.1; to: 1 1 1; dur: 200; startEvents: mouseleave"
            animation__click-up="property: position; from: 3.33 1 -1.08; to: 3.33 2.5 -1.08; dur: 500; easing: easeOutQuad; startEvents: click-up"
            animation__click-down="property: position; from: 3.33 2.5 -1.08; to: 3.33 1 -1.08; dur: 500; easing: easeOutQuad; startEvents: click-down">
        </a-plane>
        <a-text value="Akatsiya 2" align="center" position="3.33 -0.3 -1.08" rotation="0 -72 0" color="#5C3A1F" scale="0.6 0.6 0.6"></a-text>
        <a-entity id="akac2-hidden-button" position="3.33 3.2 -1.08" rotation="0 -72 0" visible="false">
            <a-box color="#8B5E3C" depth="0.2" height="0.5" width="1.2" id="akac2-go-button"></a-box>
            <a-text value="Vidkryty" align="center" position="0 0 0.15" color="#FFFFFF" scale="0.8 0.8 0.8"></a-text>
        </a-entity>

        <!-- ===== 3. Акація — зображення 3 (θ=144°, праворуч-ззаду) ===== -->
        <a-plane
            id="akac3-image"
            position="2.06 1 2.83"
            rotation="0 -144 0"
            width="1.5"
            height="2"
            color="white"
            src="#akac-img3"
            data-image="true"
            animation__cursor-enter="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
            animation__cursor-leave="property: scale; from: 1.1 1.1 1.1; to: 1 1 1; dur: 200; startEvents: mouseleave"
            animation__click-up="property: position; from: 2.06 1 2.83; to: 2.06 2.5 2.83; dur: 500; easing: easeOutQuad; startEvents: click-up"
            animation__click-down="property: position; from: 2.06 2.5 2.83; to: 2.06 1 2.83; dur: 500; easing: easeOutQuad; startEvents: click-down">
        </a-plane>
        <a-text value="Akatsiya 3" align="center" position="2.06 -0.3 2.83" rotation="0 -144 0" color="#5C3A1F" scale="0.6 0.6 0.6"></a-text>
        <a-entity id="akac3-hidden-button" position="2.06 3.2 2.83" rotation="0 -144 0" visible="false">
            <a-box color="#8B5E3C" depth="0.2" height="0.5" width="1.2" id="akac3-go-button"></a-box>
            <a-text value="Vidkryty" align="center" position="0 0 0.15" color="#FFFFFF" scale="0.8 0.8 0.8"></a-text>
        </a-entity>

        <!-- ===== 4. Береза — зображення 1 (θ=216°, ліворуч-ззаду) ===== -->
        <a-plane
            id="bere1-image"
            position="-2.06 1 2.83"
            rotation="0 144 0"
            width="1.5"
            height="2"
            color="white"
            src="#bere-img1"
            data-image="true"
            animation__cursor-enter="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
            animation__cursor-leave="property: scale; from: 1.1 1.1 1.1; to: 1 1 1; dur: 200; startEvents: mouseleave"
            animation__click-up="property: position; from: -2.06 1 2.83; to: -2.06 2.5 2.83; dur: 500; easing: easeOutQuad; startEvents: click-up"
            animation__click-down="property: position; from: -2.06 2.5 2.83; to: -2.06 1 2.83; dur: 500; easing: easeOutQuad; startEvents: click-down">
        </a-plane>
        <a-text value="Bereza 1" align="center" position="-2.06 -0.3 2.83" rotation="0 144 0" color="#5C3A1F" scale="0.6 0.6 0.6"></a-text>
        <a-entity id="bere1-hidden-button" position="-2.06 3.2 2.83" rotation="0 144 0" visible="false">
            <a-box color="#8B5E3C" depth="0.2" height="0.5" width="1.2" id="bere1-go-button"></a-box>
            <a-text value="Vidkryty" align="center" position="0 0 0.15" color="#FFFFFF" scale="0.8 0.8 0.8"></a-text>
        </a-entity>

        <!-- ===== 5. Береза — зображення 2 (θ=288°, ліворуч-спереду) ===== -->
        <a-plane
            id="bere2-image"
            position="-3.33 1 -1.08"
            rotation="0 72 0"
            width="1.5"
            height="2"
            color="white"
            src="#bere-img2"
            data-image="true"
            animation__cursor-enter="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
            animation__cursor-leave="property: scale; from: 1.1 1.1 1.1; to: 1 1 1; dur: 200; startEvents: mouseleave"
            animation__click-up="property: position; from: -3.33 1 -1.08; to: -3.33 2.5 -1.08; dur: 500; easing: easeOutQuad; startEvents: click-up"
            animation__click-down="property: position; from: -3.33 2.5 -1.08; to: -3.33 1 -1.08; dur: 500; easing: easeOutQuad; startEvents: click-down">
        </a-plane>
        <a-text value="Bereza 2" align="center" position="-3.33 -0.3 -1.08" rotation="0 72 0" color="#5C3A1F" scale="0.6 0.6 0.6"></a-text>
        <a-entity id="bere2-hidden-button" position="-3.33 3.2 -1.08" rotation="0 72 0" visible="false">
            <a-box color="#8B5E3C" depth="0.2" height="0.5" width="1.2" id="bere2-go-button"></a-box>
            <a-text value="Vidkryty" align="center" position="0 0 0.15" color="#FFFFFF" scale="0.8 0.8 0.8"></a-text>
        </a-entity>

        <script>
            var items = [
                { id: 'akac1', url: 'ontario-akac/ontario-akac-1-img1.html' },
                { id: 'akac2', url: 'ontario-akac/ontario-akac-1-img2.html' },
                { id: 'akac3', url: 'ontario-akac/ontario-akac-1-img3.html' },
                { id: 'bere1', url: 'ontario-bere/ontario-bere-1.html' },
                { id: 'bere2', url: 'ontario-bere/ontario-bere-1.html' }
            ];

            function handleImageClick(image, buttonId) {
                var currentPosition = image.getAttribute('position');
                var buttonEntity = document.querySelector(buttonId);

                if (currentPosition.y <= 1.5) {
                    image.emit('click-up');
                    buttonEntity.setAttribute('visible', true);
                } else {
                    image.emit('click-down');
                    buttonEntity.setAttribute('visible', false);
                }
            }

            items.forEach(function(item) {
                var image = document.querySelector('#' + item.id + '-image');
                var goButton = document.querySelector('#' + item.id + '-go-button');

                image.addEventListener('click', function() {
                    handleImageClick(image, '#' + item.id + '-hidden-button');
                });

                goButton.addEventListener('click', function() {
                    window.location.href = item.url;
                });
            });
        </script>
    </a-scene>
</body>
</html>
