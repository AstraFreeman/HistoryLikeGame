<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>Онтаріо — Сімейні стосунки в Україні XVIII ст.</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.1.0/dist/aframe-environment-component.min.js"></script>
</head>
<body>
    <a href="../index.html" style="position:fixed;top:15px;left:15px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:10px 16px;border-radius:8px;font-family:sans-serif;font-size:14px;backdrop-filter:blur(8px);transition:background 0.2s;">На головну</a>
    <a-scene>
        <a-assets>
            <img id="akac-img" src="ontario-akac/img_1.jpg">
            <img id="bere-img" src="ontario-bere/img_1.jpg">
        </a-assets>

        <!-- Камера з WASD-керуванням -->
        <a-entity camera look-controls wasd-controls="acceleration: 25" position="0 1.3 1">
            <a-entity id="mouseCursor" cursor="rayOrigin: mouse"></a-entity>
        </a-entity>

        <!-- Площина-основа (пергаментний колір) -->
        <a-plane
            position="0 0 -4"
            rotation="-90 0 0"
            width="10"
            height="10"
            color="#D4A574">
        </a-plane>

        <!-- Заголовок -->
        <a-text
            value="Simejni stosunky v Ukraini XVIII st."
            align="center"
            position="0 4 -3"
            font="../assets/fonts/ADVENTURE.TTF-msdf.json"
            color="#5C3A1F"
            negate="false"
            scale="0.7 0.7 0.7">
        </a-text>

        <!-- Сторінка 1: Акація -->
        <a-plane
            id="akac-image"
            position="-1.5 1 -3"
            rotation="0 0 0"
            width="1.5"
            height="2"
            color="white"
            src="#akac-img"
            data-image="true"
            animation__cursor-enter="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
            animation__cursor-leave="property: scale; from: 1.1 1.1 1.1; to: 1 1 1; dur: 200; startEvents: mouseleave"
            animation__click-up="property: position; from: -1.5 1 -3; to: -1.5 2.5 -3; dur: 500; easing: easeOutQuad; startEvents: click-up"
            animation__click-down="property: position; from: -1.5 2.5 -3; to: -1.5 1 -3; dur: 500; easing: easeOutQuad; startEvents: click-down">
        </a-plane>

        <!-- Підпис: Акація -->
        <a-text
            value="Akatsiya"
            align="center"
            position="-1.5 -0.3 -3"
            color="#5C3A1F"
            scale="0.6 0.6 0.6">
        </a-text>

        <!-- Кнопка-посилання для Акації -->
        <a-entity
            id="akac-hidden-button"
            position="-1.5 3.2 -3"
            visible="false">
            <a-box
                color="#8B5E3C"
                depth="0.2"
                height="0.5"
                width="1.2"
                id="akac-go-button">
            </a-box>
            <a-text
                value="Vidkryty"
                align="center"
                position="0 0 0.15"
                color="#FFFFFF"
                scale="0.8 0.8 0.8">
            </a-text>
        </a-entity>

        <!-- Сторінка 2: Береза -->
        <a-plane
            id="bere-image"
            position="1.5 1 -3"
            rotation="0 0 0"
            width="1.5"
            height="2"
            color="white"
            src="#bere-img"
            data-image="true"
            animation__cursor-enter="property: scale; from: 1 1 1; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
            animation__cursor-leave="property: scale; from: 1.1 1.1 1.1; to: 1 1 1; dur: 200; startEvents: mouseleave"
            animation__click-up="property: position; from: 1.5 1 -3; to: 1.5 2.5 -3; dur: 500; easing: easeOutQuad; startEvents: click-up"
            animation__click-down="property: position; from: 1.5 2.5 -3; to: 1.5 1 -3; dur: 500; easing: easeOutQuad; startEvents: click-down">
        </a-plane>

        <!-- Підпис: Береза -->
        <a-text
            value="Bereza"
            align="center"
            position="1.5 -0.3 -3"
            color="#5C3A1F"
            scale="0.6 0.6 0.6">
        </a-text>

        <!-- Кнопка-посилання для Берези -->
        <a-entity
            id="bere-hidden-button"
            position="1.5 3.2 -3"
            visible="false">
            <a-box
                color="#8B5E3C"
                depth="0.2"
                height="0.5"
                width="1.2"
                id="bere-go-button">
            </a-box>
            <a-text
                value="Vidkryty"
                align="center"
                position="0 0 0.15"
                color="#FFFFFF"
                scale="0.8 0.8 0.8">
            </a-text>
        </a-entity>

        <script>
            var akacImage = document.querySelector('#akac-image');
            var bereImage = document.querySelector('#bere-image');
            var akacGoButton = document.querySelector('#akac-go-button');
            var bereGoButton = document.querySelector('#bere-go-button');

            function handleImageClick(image, buttonId) {
                var currentPosition = image.getAttribute('position');
                var buttonEntity = document.querySelector(buttonId);

                if (currentPosition.y <= 1.5) {
                    image.emit('click-up');
                    buttonEntity.setAttribute('visible', true);
                } else {
                    image.emit('click-down');
                    buttonEntity.setAttribute('visible', false);
                }
            }

            akacImage.addEventListener('click', function() {
                handleImageClick(akacImage, '#akac-hidden-button');
            });
            bereImage.addEventListener('click', function() {
                handleImageClick(bereImage, '#bere-hidden-button');
            });

            akacGoButton.addEventListener('click', function() {
                window.location.href = 'ontario-akac/ontario-akac-1.html';
            });
            bereGoButton.addEventListener('click', function() {
                window.location.href = 'ontario-bere/ontario-bere-1.html';
            });
        </script>
    </a-scene>
</body>
</html>
