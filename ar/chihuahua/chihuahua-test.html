<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>Chihuahua — Хто ти з української історії?</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #c2410c 0%, #16a34a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 16px;
            opacity: 0.9;
        }

        .question-block {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .question-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #fff;
        }

        .option {
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(5px);
        }

        .option input[type="radio"] {
            margin-right: 10px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .option.selected {
            background: rgba(255, 255, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .button-container {
            text-align: center;
            margin-top: 30px;
        }

        button {
            background: #16a34a;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.4);
        }

        button:hover {
            background: #15803d;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(22, 163, 74, 0.6);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
            transform: none;
        }

        .result {
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .result-type {
            font-size: 20px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .result-quote {
            font-style: italic;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .result-mission {
            margin-bottom: 20px;
        }

        .result-mission h4 {
            margin-bottom: 10px;
        }

        .result-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.3);
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            transition: all 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .result-link:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .scores-display {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.8;
        }

        .back-link {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(8px);
            transition: background 0.2s;
        }

        .back-link:hover {
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-link">На головну</a>
    <div class="container">
        <h1>Хто ти з української історії?</h1>
        <p class="subtitle">Відкрий свій історичний архетип</p>

        <form id="testForm">
            <!-- Питання 1 -->
            <div class="question-block">
                <div class="question-title">1. У кризовій ситуації ти…</div>
                <div class="option">
                    <input type="radio" id="q1a" name="q1" value="A">
                    <label for="q1a">А) береш командування на себе</label>
                </div>
                <div class="option">
                    <input type="radio" id="q1b" name="q1" value="B">
                    <label for="q1b">Б) шукаєш компроміс</label>
                </div>
                <div class="option">
                    <input type="radio" id="q1c" name="q1" value="C">
                    <label for="q1c">В) ставиш під сумнів саму ситуацію</label>
                </div>
                <div class="option">
                    <input type="radio" id="q1d" name="q1" value="D">
                    <label for="q1d">Г) аналізуєш факти перед дією</label>
                </div>
            </div>

            <!-- Питання 2 -->
            <div class="question-block">
                <div class="question-title">2. Що тебе більше драйвить?</div>
                <div class="option">
                    <input type="radio" id="q2a" name="q2" value="A">
                    <label for="q2a">А) змінювати хід історії</label>
                </div>
                <div class="option">
                    <input type="radio" id="q2b" name="q2" value="B">
                    <label for="q2b">Б) впливати непомітно</label>
                </div>
                <div class="option">
                    <input type="radio" id="q2c" name="q2" value="C">
                    <label for="q2c">В) створювати ідеї</label>
                </div>
                <div class="option">
                    <input type="radio" id="q2d" name="q2" value="D">
                    <label for="q2d">Г) розуміти, як усе було насправді</label>
                </div>
            </div>

            <!-- Питання 3 -->
            <div class="question-block">
                <div class="question-title">3. Твоє ідеальне середовище:</div>
                <div class="option">
                    <input type="radio" id="q3a" name="q3" value="A">
                    <label for="q3a">А) поле дій і рішень</label>
                </div>
                <div class="option">
                    <input type="radio" id="q3b" name="q3" value="B">
                    <label for="q3b">Б) переговори і стратегії</label>
                </div>
                <div class="option">
                    <input type="radio" id="q3c" name="q3" value="C">
                    <label for="q3c">В) творчість і думки</label>
                </div>
                <div class="option">
                    <input type="radio" id="q3d" name="q3" value="D">
                    <label for="q3d">Г) архіви і дослідження</label>
                </div>
            </div>

            <!-- Питання 4 -->
            <div class="question-block">
                <div class="question-title">4. Як ти переконуєш інших?</div>
                <div class="option">
                    <input type="radio" id="q4a" name="q4" value="A">
                    <label for="q4a">А) силою авторитету</label>
                </div>
                <div class="option">
                    <input type="radio" id="q4b" name="q4" value="B">
                    <label for="q4b">Б) аргументами і вигодами</label>
                </div>
                <div class="option">
                    <input type="radio" id="q4c" name="q4" value="C">
                    <label for="q4c">В) словами і образами</label>
                </div>
                <div class="option">
                    <input type="radio" id="q4d" name="q4" value="D">
                    <label for="q4d">Г) доказами</label>
                </div>
            </div>

            <!-- Питання 5 -->
            <div class="question-block">
                <div class="question-title">5. Що для тебе головне?</div>
                <div class="option">
                    <input type="radio" id="q5a" name="q5" value="A">
                    <label for="q5a">А) результат</label>
                </div>
                <div class="option">
                    <input type="radio" id="q5b" name="q5" value="B">
                    <label for="q5b">Б) баланс</label>
                </div>
                <div class="option">
                    <input type="radio" id="q5c" name="q5" value="C">
                    <label for="q5c">В) сенс</label>
                </div>
                <div class="option">
                    <input type="radio" id="q5d" name="q5" value="D">
                    <label for="q5d">Г) істина</label>
                </div>
            </div>

            <!-- Питання 6 -->
            <div class="question-block">
                <div class="question-title">6. Якщо ти викладач історії, ти…</div>
                <div class="option">
                    <input type="radio" id="q6a" name="q6" value="A">
                    <label for="q6a">А) розігруєш битви і ролі</label>
                </div>
                <div class="option">
                    <input type="radio" id="q6b" name="q6" value="B">
                    <label for="q6b">Б) моделюєш політичні ситуації</label>
                </div>
                <div class="option">
                    <input type="radio" id="q6c" name="q6" value="C">
                    <label for="q6c">В) обговорюєш ідеї і тексти</label>
                </div>
                <div class="option">
                    <input type="radio" id="q6d" name="q6" value="D">
                    <label for="q6d">Г) працюєш з джерелами</label>
                </div>
            </div>

            <!-- Питання 7 -->
            <div class="question-block">
                <div class="question-title">7. Ти більше про…</div>
                <div class="option">
                    <input type="radio" id="q7a" name="q7" value="A">
                    <label for="q7a">А) дію</label>
                </div>
                <div class="option">
                    <input type="radio" id="q7b" name="q7" value="B">
                    <label for="q7b">Б) взаємодію</label>
                </div>
                <div class="option">
                    <input type="radio" id="q7c" name="q7" value="C">
                    <label for="q7c">В) рефлексію</label>
                </div>
                <div class="option">
                    <input type="radio" id="q7d" name="q7" value="D">
                    <label for="q7d">Г) аналіз</label>
                </div>
            </div>

            <!-- Питання 8 -->
            <div class="question-block">
                <div class="question-title">8. Що тебе дратує?</div>
                <div class="option">
                    <input type="radio" id="q8a" name="q8" value="A">
                    <label for="q8a">А) бездіяльність</label>
                </div>
                <div class="option">
                    <input type="radio" id="q8b" name="q8" value="B">
                    <label for="q8b">Б) прямолінійність</label>
                </div>
                <div class="option">
                    <input type="radio" id="q8c" name="q8" value="C">
                    <label for="q8c">В) поверхневість</label>
                </div>
                <div class="option">
                    <input type="radio" id="q8d" name="q8" value="D">
                    <label for="q8d">Г) неточність</label>
                </div>
            </div>

            <div class="button-container">
                <button type="submit">Дізнатись результат</button>
            </div>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        // Додавання класу .selected при виборі
        document.querySelectorAll('.option input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const block = this.closest('.question-block');
                block.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
                this.closest('.option').classList.add('selected');
            });
        });

        // Результати
        const RESULTS = {
            // Одиночні
            'A': {
                title: 'Богдан Хмельницький',
                type: 'Лідер',
                quote: 'Ти не чекаєш дозволу — ти дієш. Твої рішення змінюють хід історії.',
                mission: 'очолити справу, яка має значення',
                link: 'chihuahua-1.html'
            },
            'B': {
                title: 'Іван Мазепа',
                type: 'Дипломат',
                quote: 'Ти знаєш: сила не завжди в м’язах. Твоя зброя — баланс і стратегія.',
                mission: 'знайти союзників там, де інші бачать лише ворогів',
                link: 'chihuahua-2.html'
            },
            'C': {
                title: 'Леся Українка',
                type: 'Ідейник',
                quote: 'Для тебе дія без сенсу — порожнеча. Ти створюєш світ через ідеї.',
                mission: 'сформулювати думку, яка змінить світогляд',
                link: 'chihuahua-3.html'
            },
            'D': {
                title: 'Нестор Літописець',
                type: 'Дослідник',
                quote: 'Ти розумієш: без минулого немає майбутнього. Твоя місія — зберегти істину.',
                mission: 'розкрити те, що приховано часом',
                link: 'chihuahua-4.html'
            },
            // Гібриди
            'AB': {
                title: 'Політичний гравець',
                type: 'Хмельницький + Мазепа',
                quote: 'Ти не просто ведеш за собою — ти знаєш, коли домовлятись, а коли діяти.',
                mission: 'знайти баланс між силою і переговорами',
                link: 'chihuahua-5.html'
            },
            'AC': {
                title: 'Провідник ідей',
                type: 'Хмельницький + Леся Українка',
                quote: 'Твої рішення народжуються не лише з ситуації, а з переконань.',
                mission: 'сформулювати ідею, за яку варто боротись',
                link: 'chihuahua-6.html'
            },
            'AD': {
                title: 'Стратег пам\'яті',
                type: 'Хмельницький + Нестор Літописець',
                quote: 'Ти розумієш: виграти — мало. Важливо, як це запам\'ятають.',
                mission: 'відрізнити факт від інтерпретації',
                link: 'chihuahua-7.html'
            },
            'BC': {
                title: 'Архітектор сенсів',
                type: 'Мазепа + Леся Українка',
                quote: 'Ти змінюєш реальність не напряму, а через те, як люди її розуміють.',
                mission: 'показати, як ідеї стають політикою',
                link: 'chihuahua-8.html'
            },
            'BD': {
                title: 'Тіньовий аналітик',
                type: 'Мазепа + Нестор Літописець',
                quote: 'Поки всі діють, ти вже розумієш наслідки і приховані мотиви.',
                mission: 'знайти, кому це вигідно',
                link: 'chihuahua-9.html'
            },
            'CD': {
                title: 'Філософ часу',
                type: 'Сковорода + Нестор Літописець',
                quote: 'Для тебе історія — це не просто факти, а шлях до розуміння світу.',
                mission: 'знайти глибинну ідею історичної події',
                link: 'chihuahua-10.html'
            },
            // Бонус (три однакові)
            'ABC': {
                title: 'Творець епохи',
                type: 'Хмельницький + Мазепа + Леся Українка',
                quote: 'Ти здатен діяти, мислити і впливати одночасно.',
                mission: 'створити новий наратив історії',
                link: 'chihuahua-11.html'
            },
            'BCD': {
                title: 'Хранитель смислів',
                type: 'Мазепа + Леся Українка + Нестор Літописець',
                quote: 'Ти з\'єднуєш знання, ідеї і інтерпретацію.',
                mission: 'побудувати міст між минулим і майбутнім',
                link: 'chihuahua-12.html'
            }
        };

        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let scores = {A: 0, B: 0, C: 0, D: 0};
            let answers = document.querySelectorAll('input[type="radio"]:checked');

            if (answers.length < 8) {
                alert('Будь ласка, дай відповідь на всі питання!');
                return;
            }

            answers.forEach(a => scores[a.value]++);

            // Сортуємо за спаданням
            let sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);

            // Перевіряємо бонус (три однакові значення)
            if (sorted[0][1] === sorted[1][1] && sorted[1][1] === sorted[2][1]) {
                let key = [sorted[0][0], sorted[1][0], sorted[2][0]].sort().join('');
                showResult(key, scores);
                return;
            }

            // Перевіряємо гібрид (різниця ≤ 1 між першими двома)
            let [first, second] = sorted;
            if (first[1] - second[1] <= 1) {
                let key = [first[0], second[0]].sort().join('');
                showResult(key, scores);
                return;
            }

            // Одиночний результат
            showResult(first[0], scores);
        });

        function showResult(key, scores) {
            const data = RESULTS[key];
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = `
                <div class="result-title">${data.title}</div>
                <div class="result-type">${data.type}</div>
                <div class="result-quote">"${data.quote}"</div>
                <div class="result-mission">
                    <h4>Місія:</h4>
                    <p>${data.mission}</p>
                </div>
                <a href="${data.link}" class="result-link">Відкрити AR-сцену</a>
                <div class="scores-display">
                    <span>А: ${scores.A}</span>
                    <span>Б: ${scores.B}</span>
                    <span>В: ${scores.C}</span>
                    <span>Г: ${scores.D}</span>
                </div>
            `;
            resultDiv.classList.add('show');
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    </script>
</body>
</html>
