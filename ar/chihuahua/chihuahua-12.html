<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>Chihuahua — Хранитель смислів</title>
    <meta name="description" content="Chihuahua — Бонус B+C+D: Мазепа + Леся Українка + Нестор Літописець">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        .back-link {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 9999;
            background: linear-gradient(135deg, rgba(194, 65, 12, 0.9), rgba(22, 163, 74, 0.9));
            color: #fff;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-family: sans-serif;
            font-size: 14px;
            backdrop-filter: blur(8px);
            transition: background 0.2s;
            font-weight: bold;
        }
        .back-link:hover {
            background: linear-gradient(135deg, rgba(194, 65, 12, 1), rgba(22, 163, 74, 1));
        }
    </style>
</head>
<body>
    <a href="chihuahua-test.html" class="back-link">← Повернутися до тесту</a>

    <a-scene embedded arjs>
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

        <a-marker preset="hiro">
            <!-- ЗАПОВНИТИ: модель та зображення -->
            <a-gltf-model
                src="../../assets/models/YOUR_MODEL.glb"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
            </a-gltf-model>

            <a-sphere
                id="toggle-button"
                class="clickable"
                position="0 1.8 0"
                radius="0.12"
                color="#fbbf24"
                event-set__show="_event: click; target: #info-panel; property: visible; value: true">
            </a-sphere>

            <a-entity id="info-panel" position="0 1.5 0.3" visible="false">
                <!-- ЗАПОВНИТИ: зображення для панелі -->
                <a-image
                    src="image_1.jpg"
                    position="-0.6 0 0"
                    width="0.5"
                    height="0.5">
                </a-image>

                <a-image
                    src="image_2.jpg"
                    position="0.6 0 0"
                    width="0.5"
                    height="0.5">
                </a-image>

                <a-plane
                    class="clickable"
                    position="0 -0.8 0"
                    width="0.8"
                    height="0.3"
                    color="#fbbf24"
                    event-set__hide="_event: click; target: #info-panel; property: visible; value: false">
                    <a-text
                        value="Закрити"
                        align="center"
                        color="#000000"
                        position="0 0 0.02">
                    </a-text>
                </a-plane>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
