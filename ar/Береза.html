<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>Історія Любові Предків</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; 
            --card: rgba(15, 23, 42, 0.95);
            --accent: #f59e0b; /* Теплий вогняний колір */
            --text: #f1f5f9;
            --correct: #10b981; 
            --wrong: #ef4444;    
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-box {
            width: 90%;
            max-width: 550px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(245, 158, 11, 0.2);
            border-radius: 40px;
            padding: 35px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            margin: 20px;
        }

        .progress-bar-wrap {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 10px; margin-bottom: 25px; overflow: hidden;
        }

        #progress-fill {
            height: 100%; width: 0%; background: var(--accent);
            transition: width 0.4s ease;
        }

        .q-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-family: 'Oswald', sans-serif; text-align: center; color: var(--accent); letter-spacing: 2px; margin-top: 0; }

        .question-card { display: none; animation: fadeIn 0.5s ease; }
        .question-card.active { display: block; }

        .question-text { font-size: 1.25rem; margin-bottom: 20px; text-align: center; font-weight: 700; line-height: 1.4; color: #cbd5e1; }

        .options-list { display: flex; flex-direction: column; gap: 12px; }

        .opt {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            padding: 16px 20px; border-radius: 18px; cursor: pointer; transition: 0.3s;
            font-size: 1rem;
        }

        .options-list:not(.answered) .opt:hover {
            background: rgba(245, 158, 11, 0.1); border-color: var(--accent);
        }

        .opt.correct-flash { background-color: var(--correct) !important; color: white !important; border-color: var(--correct); }
        .opt.wrong-flash { background-color: var(--wrong) !important; color: white !important; border-color: var(--wrong); }

        .options-list.answered .opt { pointer-events: none; }

        .controls { margin-top: 30px; text-align: center; }

        .btn-nav {
            padding: 16px 50px; border-radius: 50px; border: none; background: var(--accent);
            color: #000; font-family: 'Oswald', sans-serif; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; opacity: 0.2; pointer-events: none; transition: 0.3s;
        }

        .btn-nav.active { opacity: 1; pointer-events: auto; box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }

        #result-screen { text-align: center; display: none; }

        .code-word-box {
            background: rgba(0,0,0,0.5); border-radius: 25px; padding: 25px;
            margin: 20px 0; border: 2px dashed var(--accent);
        }
        .code-letters { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .letter {
            width: 45px; height: 60px; display: flex; align-items: center; justify-content: center;
            background: #1e293b; border-radius: 12px; font-family: 'Oswald'; font-size: 2.2rem;
            border-bottom: 4px solid var(--accent); color: #334155;
        }
        .letter.correct { color: var(--accent); text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="game-box">
    <div id="start-screen" style="text-align: center;">
        <img src="https://images.unsplash.com/photo-1503152394-c571994fd383?auto=format&fit=crop&w=800&q=80" class="q-image" alt="Стародавність">
        <h1>🌙 ТАЄМНИЦЯ ПРЕДКІВ</h1>
        <p>Дізнайся, як кохали та створювали родини стародавні люди тисячі років тому.</p>
        <button class="btn-nav active" onclick="startGame()">Почати подорож</button>
    </div>

    <div id="quiz-ui" style="display: none;">
        <div class="progress-bar-wrap"><div id="progress-fill"></div></div>
        <div id="questions-container"></div>
        <div class="controls">
            <button type="button" class="btn-nav" id="nextBtn" onclick="moveNext()">Далі</button>
        </div>
    </div>

    <div id="result-screen">
        <img src="https://images.unsplash.com/photo-1514917860136-ee8b185699f9?auto=format&fit=crop&w=800&q=80" class="q-image" alt="Код">
        <h1>Твоє відкриття</h1>
        <div id="rank-text" style="font-size: 1.2rem; margin-bottom: 10px;"></div>
        <div class="code-word-box">
            <div style="color: var(--accent); font-size: 0.8rem; letter-spacing: 2px;">МАГІЧНЕ СЛОВО:</div>
            <div class="code-letters" id="code-display"></div>
        </div>
        <button class="btn-nav active" onclick="location.reload()">Пройти ще раз</button>
    </div>
</div>

<script>
    const questions = [
        { 
            q: "Хто мав вирішальне слово у справі шлюбу?", 
            a: ["Діти", "Батьки та старійшини роду", "Сусіди", "Вороги з іншої печери"], 
            c: 1,
            img: "https://images.unsplash.com/photo-1533106497176-45ae19e68ba2?auto=format&fit=crop&w=800&q=80" 
        },
        { 
            q: "Навіщо стародавнім людям потрібен був шлюб?", 
            a: ["Для виживання та об'єднання сил", "Для вечірок", "Щоб змінити ім'я", "Щоб не працювати"], 
            c: 0,
            img: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=800&q=80"
        },
        { 
            q: "Що таке 'Екзогамія'?", 
            a: ["Шлюб тільки всередині своєї печери", "Шлюб за межами своєї громади", "Заборона мати сім'ю", "Полювання на мамонтів"], 
            c: 1,
            img: "https://images.unsplash.com/photo-1501139083538-0139583c060f?auto=format&fit=crop&w=800&q=80"
        },
        { 
            q: "Майно нареченої в стародавніх громадах - це:", 
            a: ["Золото", "Смартфон", "Посаг (худоба, шкури, знаряддя)", "Намисто з ракушок"], 
            c: 2,
            img: "https://images.unsplash.com/photo-1531050171654-a76b71dfbb1e?auto=format&fit=crop&w=800&q=80"
        },
        { 
            q: "За що роду нареченої платили викуп (віно)?", 
            a: ["За сукню", "За втрату робочих рук у сім'ї", "Просто подарунок", "Щоб відсвяткувати"], 
            c: 1,
            img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=800&q=80"
        },
        { 
            q: "Хто такий старійшина в стародавні часи?", 
            a: ["Найбагатша людина", "Наймудріший хранитель традицій", "Найсильніший воїн", "Той, хто знайшов вогонь"], 
            c: 1,
            img: "https://images.unsplash.com/photo-1490197413361-573b0881f182?auto=format&fit=crop&w=800&q=80"
        },
        { 
            q: "Як зазвичай приймалося рішення про шлюб?", 
            a: ["Сам вирішив", "Колективне рішення всієї родини", "Випав жереб", "Побачив у сні"], 
            c: 1,
            img: "https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=800&q=80"
        },
        { 
            q: "Що було найважливішим для стародавнього клану?", 
            a: ["Нові пісні", "Мораль, ресурси та виживання", "Тільки їжа", "Ігри"], 
            c: 1,
            img: "https://images.unsplash.com/photo-1534067783941-51c9c23ceff3?auto=format&fit=crop&w=800&q=80"
        },
        { 
            q: "Чому шукали пару в інших громадах?", 
            a: ["Для міцного та здорового потомства", "Бо так дешевше", "Для веселощів", "Бо так сказав шаман"], 
            c: 0,
            img: "https://images.unsplash.com/photo-1520127873598-120e4b23adba?auto=format&fit=crop&w=800&q=80"
        },
        { 
            q: "Чи був шлюб у предків лише справою двох людей?", 
            a: ["Так, звісно", "Ні, це був союз двох цілих родів", "Тільки якщо дозволив вождь", "Не знаю"], 
            c: 1,
            img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&w=800&q=80"
        }
    ];

    let current = 0, score = 0, answered = false;
    let audioCtx;

    function initAudio() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playNote(freq, dur, type) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function startGame() {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        answered = false;
        const btn = document.getElementById('nextBtn');
        btn.classList.remove('active');
        const container = document.getElementById('questions-container');
        container.innerHTML = '';
        const qData = questions[current];
        
        const card = document.createElement('div');
        card.className = 'question-card active';
        card.innerHTML = `
            <img src="${qData.img}" class="q-image" alt="Question Image">
            <p class="question-text">${current + 1}. ${qData.q}</p>
        `;
        
        const list = document.createElement('div');
        list.className = 'options-list';
        qData.a.forEach((opt, i) => {
            const div = document.createElement('div');
            div.className = 'opt'; div.innerText = opt;
            div.onclick = () => {
                if(answered) return;
                answered = true;
                list.classList.add('answered');
                if(i === qData.c) {
                    div.classList.add('correct-flash'); score++;
                    playNote(800, 0.2, 'sine');
                } else {
                    div.classList.add('wrong-flash');
                    list.querySelectorAll('.opt')[qData.c].classList.add('correct-flash');
                    playNote(200, 0.3, 'triangle');
                }
                btn.classList.add('active');
            };
            list.appendChild(div);
        });
        card.appendChild(list);
        container.appendChild(card);
        document.getElementById('progress-fill').style.width = ((current + 1) / questions.length * 100) + '%';
    }

    function moveNext() {
        playNote(400, 0.1, 'square');
        if(current < questions.length - 1) {
            current++; renderQuestion();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const word = "БЕРЕЗА";
        let openCount = 0;
        if (score >= 1) openCount = 1; if (score >= 3) openCount = 2;
        if (score >= 5) openCount = 3; if (score >= 7) openCount = 4;
        if (score >= 9) openCount = 5; if (score === 10) openCount = 6;

        const display = document.getElementById('code-display');
        for(let i=0; i<word.length; i++) {
            const l = document.createElement('div');
            l.className = 'letter' + (i < openCount ? ' correct' : '');
            l.innerText = (i < openCount ? word[i] : '?');
            display.appendChild(l);
        }
        document.getElementById('rank-text').innerText = `Ти здобув ${score} балів мудрості предків!`;
        playNote(523, 0.5, 'sine');
    }
</script>
</body>
</html>
