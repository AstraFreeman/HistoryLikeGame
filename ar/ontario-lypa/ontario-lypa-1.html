<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>AR Міфи про кохання — Липа</title>
    <meta name="description" content="AR-підручник: міфи про кохання">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0;overflow:hidden;">
    <a href="../../index.html" style="position:fixed;top:15px;left:15px;z-index:9999;background:rgba(0,0,0,0.6);color:#fff;text-decoration:none;padding:10px 16px;border-radius:8px;font-family:sans-serif;font-size:14px;backdrop-filter:blur(8px);transition:background 0.2s;">На головну</a>

    <a-scene embedded arjs>
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

        <a-marker preset="hiro">

            <!-- МОДЕЛЬ: розкоментуйте та вкажіть шлях до вашого .glb файлу в папці models/ -->
            <!--
            <a-gltf-model
                src="models/ваша-модель.glb"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
            </a-gltf-model>
            -->

            <a-sphere
                id="toggle-button"
                class="clickable"
                position="0 1.8 0"
                radius="0.12"
                color="#D4A574"
                event-set__show="_event: click; target: #info-panel; property: visible; value: true">
            </a-sphere>

            <a-entity id="info-panel" position="0 1.5 0.3" visible="false">

                <a-image
                    src="img_1.jpg"
                    position="-0.6 0 0"
                    width="0.5"
                    height="0.5">
                </a-image>

                <a-image
                    src="img_2.jpg"
                    position="0.6 0 0"
                    width="0.5"
                    height="0.5">
                </a-image>

                <a-link
                    href="ontario-lypa-test.html"
                    position="0 -0.4 0"
                    scale="0.6 0.6 0.6"
                    title="Далі"
                    look-at="[camera]">
                    <a-plane class="clickable" color="#007BFF" width="1" height="0.5"></a-plane>
                    <a-text value="Далі" align="center" color="#FFFFFF" position="0 0 0.02"></a-text>
                </a-link>

                <a-plane
                    class="clickable"
                    position="0 -0.8 0"
                    width="0.8"
                    height="0.3"
                    color="#DC3545"
                    event-set__hide="_event: click; target: #info-panel; property: visible; value: false">
                    <a-text value="Закрити" align="center" color="#FFFFFF" position="0 0 0.02"></a-text>
                </a-plane>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
